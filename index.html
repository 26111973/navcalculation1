<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VENT·HSI">
<title>✈ VENT · HSI · VP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#5a7fa0;--bg2:#3d6080;--bg3:#2e5070;--bg4:#1e3d5a;
  --amber:#ffcc55;--amber2:#ffb830;--amber3:#ff9900;
  --cyan:#60e0ff;--cyan2:#30ccf0;
  --green:#40e8a0;--green2:#20cc80;
  --red:#ff5060;--red2:#ff2840;
  --gray:#a0bcd0;--gray2:#80a4bc;--gray3:#c8dce8;--gray4:#e0eef8;
  --text:#f0f8ff;
  --sep:1px solid #4a7090;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:13px}
.app{padding:10px;max-width:520px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 10px;border-bottom:var(--sep);margin-bottom:10px}
.topbar-title{font-size:10px;letter-spacing:4px;color:var(--amber2);display:flex;align-items:center;gap:8px}
.logo-hsi{width:36px;height:36px;flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-badge{font-size:9px;letter-spacing:2px;color:var(--gray3);background:var(--bg3);padding:3px 8px;border-radius:3px;border:1px solid var(--gray)}
.topbar-utc{font-size:9px;letter-spacing:1px;color:var(--gray3)}
.live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green2);box-shadow:0 0 5px var(--green2);animation:blink 2s infinite;margin-right:4px;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.section{background:var(--bg2);border:var(--sep);border-radius:6px;padding:10px;margin-bottom:10px}
.sec-title{font-size:9px;letter-spacing:3px;color:var(--gray3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #4a7090}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:9px;letter-spacing:2px;color:var(--gray4)}
.field-row{display:flex;align-items:center;gap:4px}
.field input{background:var(--bg4);border:1px solid var(--gray);color:var(--amber2);font-family:'Courier New',monospace;font-size:16px;padding:6px 8px;border-radius:4px;width:100%;text-align:right}
.field input:focus{outline:none;border-color:var(--amber);color:var(--amber3);background:var(--bg3)}
.field .unit{font-size:10px;color:var(--gray3);min-width:22px}
.computed{background:var(--bg3);border-radius:4px;padding:6px 8px;display:flex;justify-content:space-between;align-items:center}
.computed .lbl{font-size:9px;letter-spacing:2px;color:var(--gray4)}
.computed .val{font-size:17px;color:var(--cyan2);font-weight:bold}
.btns{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;padding:9px;font-size:10px;letter-spacing:3px;font-family:'Courier New',monospace;cursor:pointer;border-radius:4px;border:none;transition:all 0.12s;font-weight:bold}
.btn-go{background:#1a6fa8;color:#fff}
.btn-go:hover{background:#1e88cc}
.btn-go:active{transform:scale(0.97)}
.btn-rst{background:transparent;color:var(--gray3);border:1px solid var(--gray)}
.btn-rst:hover{color:var(--text);border-color:var(--gray3)}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.res-card{background:var(--bg3);border-radius:5px;padding:8px 10px;border-left:2px solid var(--gray2)}
.res-card.ok{border-left-color:var(--green)}
.res-card.warn{border-left-color:var(--amber)}
.res-card.danger{border-left-color:var(--red)}
.res-card.cyan{border-left-color:var(--cyan)}
.res-card .rl{font-size:8px;letter-spacing:2px;color:var(--gray4);margin-bottom:2px}
.res-card .rf{font-size:9px;color:var(--gray3);margin-bottom:3px;font-style:italic}
.res-card .rv{font-size:18px;font-weight:bold;color:var(--green2)}
.res-card.warn .rv{color:var(--amber2)}
.res-card.danger .rv{color:var(--red2)}
.res-card.cyan .rv{color:var(--cyan2)}
.res-card .ru{font-size:10px;color:var(--gray3)}
.hsi-container{display:flex;flex-direction:column;align-items:center;gap:8px}
.hsi-top-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;width:100%}
.hsi-badge{background:var(--bg3);border-radius:4px;padding:5px 6px;text-align:center}
.hsi-badge .bl{font-size:8px;letter-spacing:2px;color:var(--gray4);margin-bottom:2px}
.hsi-badge .bv{font-size:14px;font-weight:bold}
.bv.amber{color:var(--amber2)}
.bv.cyan{color:var(--cyan2)}
.bv.green{color:var(--green2)}
.legend-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1px;color:var(--gray4)}
.leg-line{width:20px;height:3px;border-radius:1px}
.trig-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:11px;font-family:'Courier New',monospace}
.trig-table th{font-size:8px;letter-spacing:2px;color:var(--gray4);padding:3px 4px;text-align:center;border-bottom:1px solid #4a7090}
.trig-table td{padding:3px 4px;text-align:center;color:#40e8a0;border:1px solid #4a7090;background:var(--bg3)}
.trig-table td.trig-hit{color:#ff5060 !important;font-weight:bold;background:#3a1020;border-color:#ff5060}
.trig-table .trig-angle{color:var(--gray4);font-size:10px;background:var(--bg4);font-weight:bold}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <span class="topbar-title">
      <svg style="width:36px;height:36px;flex-shrink:0" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="17" fill="#f0f8ff" stroke="#90b4c8" stroke-width="1.5"/>
        <circle cx="18" cy="18" r="14.5" fill="none" stroke="#b0ccd8" stroke-width="0.8"/>
        <line x1="18" y1="4" x2="18" y2="7.5" stroke="#c02030" stroke-width="1.8"/>
        <text x="18" y="11.5" text-anchor="middle" font-size="4.5" font-family="Courier New" font-weight="bold" fill="#c02030">N</text>
        <line x1="18" y1="32" x2="18" y2="28.5" stroke="#4a6878" stroke-width="1.2"/>
        <line x1="32" y1="18" x2="28.5" y2="18" stroke="#4a6878" stroke-width="1.2"/>
        <line x1="4" y1="18" x2="7.5" y2="18" stroke="#4a6878" stroke-width="1.2"/>
        <line x1="28.5" y1="7.5" x2="26.3" y2="9.7" stroke="#8aa0b0" stroke-width="0.8"/>
        <line x1="7.5" y1="7.5" x2="9.7" y2="9.7" stroke="#8aa0b0" stroke-width="0.8"/>
        <line x1="28.5" y1="28.5" x2="26.3" y2="26.3" stroke="#8aa0b0" stroke-width="0.8"/>
        <line x1="7.5" y1="28.5" x2="9.7" y2="26.3" stroke="#8aa0b0" stroke-width="0.8"/>
        <polygon points="18,4 16.2,1.5 19.8,1.5" fill="#b06000"/>
        <line x1="18" y1="18" x2="18" y2="6" stroke="#b06000" stroke-width="2"/>
        <polygon points="18,6 16.5,9.5 19.5,9.5" fill="#b06000"/>
        <line x1="18" y1="18" x2="18" y2="29" stroke="#7a4010" stroke-width="1.5"/>
        <line x1="18" y1="18" x2="14.5" y2="6.2" stroke="#006890" stroke-width="1.5" stroke-dasharray="3,2"/>
        <polygon points="18,11 19.2,20 18,18.5 16.8,20" fill="#1a3040"/>
        <polygon points="10.5,17.5 25.5,17.5 24,15 12,15" fill="#1a3040"/>
        <polygon points="14.5,22.5 21.5,22.5 20,19.5 16,19.5" fill="#3a5868"/>
        <circle cx="18" cy="11" r="1.5" fill="#1a3040"/>
        <circle cx="18" cy="18" r="2" fill="#b06000"/>
      </svg>
      VENT · HSI · VP
    </span>
    <div class="topbar-right">
      <span class="topbar-utc"><span class="live-dot"></span><span id="utc-clock">--:--:-- Z</span></span>
      <span class="topbar-badge">AVIONIQUE v6</span>
    </div>
  </div>

  <!-- ATMOSPHÈRE & ALTITUDE -->
  <div class="section">
    <div class="sec-title">ATMOSPHÈRE &amp; ALTITUDE</div>
    <div class="grid2">
      <div class="field">
        <label>ALTITUDE PRESSION</label>
        <div class="field-row">
          <input type="number" id="alt" value="8000" min="0" max="45000" step="100" oninput="liveVP()">
          <span class="unit">ft</span>
        </div>
      </div>
      <div class="field">
        <label>OAT (TEMP EXT)</label>
        <div class="field-row">
          <input type="number" id="oat" value="-5" min="-70" max="50" step="1" oninput="liveVP()">
          <span class="unit">°C</span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <div class="computed" style="flex:1">
        <span class="lbl">ISA REF</span>
        <span class="val" id="isa-ref">—</span>
      </div>
      <div class="computed" style="flex:1">
        <span class="lbl">ÉCART ISA</span>
        <span class="val" id="isa-dev">—</span>
      </div>
    </div>
  </div>

  <!-- VITESSES -->
  <div class="section">
    <div class="sec-title">VITESSES</div>
    <div class="grid2">
      <div class="field">
        <label>IAS (VITESSE INDIQUÉE)</label>
        <div class="field-row">
          <input type="number" id="ias" value="150" min="30" max="500" step="1" oninput="liveVP()">
          <span class="unit">kt</span>
        </div>
      </div>
      <div class="field">
        <label>TAS CALCULÉE</label>
        <div class="computed" style="height:38px;border-radius:4px">
          <span class="lbl">TAS</span>
          <span class="val" id="tas-val" style="font-size:20px;color:var(--cyan2)">—</span>
        </div>
      </div>
    </div>
    <div style="margin-top:8px" class="field">
      <label>VITESSE SOL GPS</label>
      <div class="field-row">
        <input type="number" id="gs" value="165" min="0" max="800" step="1">
        <span class="unit">kt</span>
      </div>
    </div>
  </div>

  <!-- CAP & ROUTE -->
  <div class="section">
    <div class="sec-title">CAP &amp; ROUTE</div>
    <div class="grid2">
      <div class="field">
        <label>CAP MAG (HDG)</label>
        <div class="field-row">
          <input type="number" id="hdg" value="090" min="0" max="359" step="1" oninput="liveHSI()">
          <span class="unit">°</span>
        </div>
      </div>
      <div class="field">
        <label>ROUTE SOL (TRK)</label>
        <div class="field-row">
          <input type="number" id="trk" value="075" min="0" max="359" step="1" oninput="liveHSI()">
          <span class="unit">°</span>
        </div>
      </div>
    </div>
    <div class="btns">
      <button class="btn btn-go" onclick="calcul()">CALCULER</button>
      <button class="btn btn-rst" onclick="resetAll()">RESET</button>
    </div>
  </div>

  <!-- HSI -->
  <div class="section">
    <div class="sec-title">HSI — HORIZONTAL SITUATION INDICATOR</div>
    <div class="hsi-container">
      <div class="hsi-top-row">
        <div class="hsi-badge"><div class="bl">TRK</div><div class="bv cyan" id="b-trk">075°</div></div>
        <div class="hsi-badge"><div class="bl">HDG</div><div class="bv amber" id="b-hdg">090°</div></div>
        <div class="hsi-badge"><div class="bl">WD / WS</div><div class="bv green" id="b-wd">—</div></div>
      </div>
      <canvas id="hsi" width="310" height="310" style="display:block"></canvas>
      <div class="legend-row">
        <div class="leg"><div class="leg-line" style="background:#b06000"></div>CAP HDG</div>
        <div class="leg"><div class="leg-line" style="background:#006890;border-top:2px dashed #006890;height:0"></div>ROUTE TRK</div>
        <div class="leg"><div class="leg-line" style="background:#007850"></div>PROVENANCE VENT</div>
        <div class="leg"><div class="leg-line" style="border-top:2px dashed #e8c000;height:0;background:transparent"></div>⊥ TRK</div>
      </div>
    </div>
  </div>

  <!-- RÉSULTATS -->
  <div class="section" id="res-section" style="display:none">
    <div class="sec-title">RÉSULTATS — MÉTHODE 1/3 HW + XW</div>
    <div class="results-grid" id="res-grid"></div>
    <div id="corr-box" style="margin-top:8px;background:var(--bg3);border-radius:5px;padding:10px;border-left:3px solid var(--amber)"></div>
  </div>

</div>

<script>
const D=Math.PI/180,R2D=180/Math.PI;
let state={hdg:90,trk:75,tas:0,gs:165,wdir:null,wspd:null,wprov:null,hw:null,xw:null,calcDone:false};

/* ── UTC clock ── */
function tickUTC(){
  const n=new Date(),z=v=>String(v).padStart(2,'0');
  document.getElementById('utc-clock').textContent=z(n.getUTCHours())+':'+z(n.getUTCMinutes())+':'+z(n.getUTCSeconds())+' Z';
}
setInterval(tickUTC,1000);tickUTC();

/* ── liveVP ── */
function liveVP(){
  const alt=parseFloat(document.getElementById('alt').value)||0;
  const oat=parseFloat(document.getElementById('oat').value)||0;
  const ias=parseFloat(document.getElementById('ias').value)||0;
  const isaRef=15-(alt/1000)*1.9812;
  const isaDev=oat-isaRef;
  document.getElementById('isa-ref').textContent=isaRef.toFixed(1)+'°C';
  const dEl=document.getElementById('isa-dev');
  dEl.textContent=(isaDev>=0?'+':'')+isaDev.toFixed(1)+'°C';
  dEl.style.color=Math.abs(isaDev)>10?'#ff5060':Math.abs(isaDev)>5?'#ffcc55':'#60e0ff';
  const Tk=oat+273.15,p0=101325,T0=288.15,L=0.0065,g=9.80665,M=0.0289644,Rv=8.314472;
  const altM=alt*0.3048;
  const press=p0*Math.pow(1-L*altM/T0,g*M/(Rv*L));
  const density=(press*M)/(Rv*Tk);
  const tas=ias*Math.sqrt(1.225/density);
  state.tas=tas;
  document.getElementById('tas-val').textContent=tas.toFixed(1)+' kt';
}

/* ── liveHSI ── */
function liveHSI(){
  const hdg=((parseFloat(document.getElementById('hdg').value)||0)+360)%360;
  const trk=((parseFloat(document.getElementById('trk').value)||0)+360)%360;
  state.hdg=hdg; state.trk=trk;
  document.getElementById('b-hdg').textContent=hdg.toFixed(0).padStart(3,'0')+'°';
  document.getElementById('b-trk').textContent=trk.toFixed(0).padStart(3,'0')+'°';
  drawHSI();
}

/* ── calcul principal ── */
function calcul(){
  liveVP();
  const hdg=((parseFloat(document.getElementById('hdg').value)||0)+360)%360;
  const trk=((parseFloat(document.getElementById('trk').value)||0)+360)%360;
  const tas=state.tas;
  const gs=parseFloat(document.getElementById('gs').value)||0;
  state.hdg=hdg; state.trk=trk; state.gs=gs;

  /* Triangle des vitesses exact — tout en magnétique */
  const tx=tas*Math.sin(hdg*D), ty=tas*Math.cos(hdg*D);
  const gsx=gs*Math.sin(trk*D), gsy=gs*Math.cos(trk*D);
  const wx=gsx-tx, wy=gsy-ty;
  const wspd=Math.sqrt(wx*wx+wy*wy);
  const wdir=((Math.atan2(wx,wy)*R2D)+360)%360;  // direction vers laquelle va le vent (mag)
  const wprov=((wdir+180)+360)%360;               // provenance (mag)

  /* Angle entre provenance vent et cap */
  const angleAuVent=((wprov-hdg)+540)%360-180;
  const angleAbs=Math.abs(angleAuVent);

  /* Composantes */
  const hw=wspd*Math.cos(angleAbs*D);
  const isFace=angleAbs<=90;
  const hwSigned=isFace?hw:-hw;
  const xw=wspd*Math.sin(angleAuVent*D);

  /* Méthode 1/3 : force = max(|HW|,|XW|) + 1/3 × min(|HW|,|XW|)
     Direction reconstruite par atan2(XW, HW) depuis le cap          */
  const absHW=Math.abs(hwSigned), absXW=Math.abs(xw);
  const wspdApprox=Math.max(absHW,absXW)+(Math.min(absHW,absXW)/3);
  const wdirApprox=((hdg+(Math.atan2(xw,hwSigned)*R2D))+360)%360;
  const wprovApprox=((wdirApprox+180)+360)%360;

  state.wdir=wdir; state.wprov=wprov; state.wspd=wspd;
  state.hw=hwSigned; state.xw=xw; state.angleAuVent=angleAbs; state.isFace=isFace;
  state.wprovA=wprovApprox; state.wspdA=wspdApprox;
  state.calcDone=true;

  document.getElementById('b-wd').textContent=wprov.toFixed(0).padStart(3,'0')+'° / '+wspd.toFixed(0)+'kt';
  document.getElementById('b-hdg').textContent=hdg.toFixed(0).padStart(3,'0')+'°';
  document.getElementById('b-trk').textContent=trk.toFixed(0).padStart(3,'0')+'°';

  const derive=((trk-hdg+540)%360-180);
  const hwLbl=isFace?'VENT DE FACE':'VENT DE DOS';
  const xwSide=xw>0?'DR → GA':'GA → DR';
  const hwCls=Math.abs(hwSigned)>20?'danger':Math.abs(hwSigned)>10?'warn':'ok';
  const xwCls=Math.abs(xw)>25?'danger':'cyan';
  const cosFormula=`${wspd.toFixed(1)} × cos(${angleAbs.toFixed(1)}°)`;

  document.getElementById('res-section').style.display='block';
  document.getElementById('res-grid').innerHTML=`
    <div class="res-card ok">
      <div class="rl">PROVENANCE VENT</div>
      <div class="rv">${wprov.toFixed(0).padStart(3,'0')}°<span class="ru"> mag</span></div>
    </div>
    <div class="res-card ok">
      <div class="rl">FORCE VENT (WS)</div>
      <div class="rv">${wspd.toFixed(1)}<span class="ru"> kt</span></div>
    </div>
    <div class="res-card ${hwCls}">
      <div class="rl">COMPOSANTE ${hwLbl}</div>
      <div class="rf">WS × cos(α) = ${cosFormula}</div>
      <div class="rv">${Math.abs(hwSigned).toFixed(1)}<span class="ru"> kt</span></div>
    </div>
    <div class="res-card ${xwCls}">
      <div class="rl">TRAVERSIER ${xwSide}</div>
      <div class="rf">${wspd.toFixed(1)} × sin(${angleAbs.toFixed(1)}°)</div>
      <div class="rv">${Math.abs(xw).toFixed(1)}<span class="ru"> kt</span></div>
    </div>
    <div class="res-card ok">
      <div class="rl">ANGLE AU VENT (α)</div>
      <div class="rv">${angleAbs.toFixed(1)}<span class="ru"> °</span></div>
    </div>
    <div class="res-card ${Math.abs(derive)>10?'warn':'ok'}">
      <div class="rl">DÉRIVE</div>
      <div class="rv">${derive.toFixed(1)}<span class="ru"> °</span></div>
    </div>
  `;

  const capCorrige=(Math.round(hdg+derive)+360)%360;
  document.getElementById('corr-box').innerHTML=`
    <div style="font-size:9px;letter-spacing:3px;color:var(--gray4);margin-bottom:8px">MÉTHODE MAX + 1/3 MIN</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div><div style="font-size:8px;letter-spacing:2px;color:var(--gray4);margin-bottom:3px">COMPOSANTE MAX</div>
        <div style="font-size:16px;color:var(--amber2);font-weight:bold">${Math.max(absHW,absXW).toFixed(1)} kt</div></div>
      <div><div style="font-size:8px;letter-spacing:2px;color:var(--gray4);margin-bottom:3px">1/3 COMPOSANTE MIN</div>
        <div style="font-size:16px;color:${Math.abs(xw)>25?'var(--red)':'var(--cyan2)'};font-weight:bold">${(Math.min(absHW,absXW)/3).toFixed(1)} kt</div></div>
      <div><div style="font-size:8px;letter-spacing:2px;color:var(--gray4);margin-bottom:3px">PROV APPROX</div>
        <div style="font-size:16px;color:var(--green2);font-weight:bold">${wprovApprox.toFixed(0).padStart(3,'0')}°</div></div>
      <div><div style="font-size:8px;letter-spacing:2px;color:var(--gray4);margin-bottom:3px">FORCE APPROX</div>
        <div style="font-size:16px;color:var(--green2);font-weight:bold">${wspdApprox.toFixed(1)} kt</div></div>
    </div>
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid #4a7090;font-size:9px;letter-spacing:2px;color:var(--gray4)">
      CORRECTION CAP → <span style="color:var(--amber2);font-size:15px;font-weight:bold">${capCorrige.toFixed(0).padStart(3,'0')}°</span>
      <span style="color:var(--gray3)"> (dérive ${derive>0?'+':''}${derive.toFixed(1)}°)</span>
    </div>
  `;
  drawHSI();
  // remove old trig table if present
  const old=document.getElementById('trig-section');if(old)old.remove();
  buildTrigTable();
}

/* ── Tableau SIN / COS 20°→90° ── */
function buildTrigTable(){
  const angles=[20,30,40,50,60,70,80,90];
  const alpha=state.angleAuVent;  // angle entre provenance vent et cap

  // Trouve la colonne la plus proche (si écart ≤ 5°)
  function nearestAngle(val){
    if(val===null||val===undefined)return null;
    let best=null,bestD=999;
    angles.forEach(a=>{if(Math.abs(a-val)<bestD){bestD=Math.abs(a-val);best=a;}});
    return bestD<=5?best:null;
  }
  const hit=nearestAngle(alpha);  // même angle pour sin et cos

  let html=`<div style="font-size:9px;letter-spacing:3px;color:var(--gray4);margin-bottom:4px;margin-top:10px">TABLE SIN / COS</div>`;
  html+=`<table class="trig-table"><thead><tr><th>α°</th>`;
  angles.forEach(a=>{ html+=`<th>${a}</th>`; });
  html+=`</tr></thead><tbody>`;

  // Ligne COS → composante HW (vent de face/dos)
  html+=`<tr><td class="trig-angle">COS</td>`;
  angles.forEach(a=>{
    const v=Math.cos(a*Math.PI/180);
    html+=`<td class="${hit===a?'trig-hit':''}">${v.toFixed(2)}</td>`;
  });
  html+=`</tr>`;

  // Ligne SIN → composante XW (vent traversier)
  html+=`<tr><td class="trig-angle">SIN</td>`;
  angles.forEach(a=>{
    const v=Math.sin(a*Math.PI/180);
    html+=`<td class="${hit===a?'trig-hit':''}">${v.toFixed(2)}</td>`;
  });
  html+=`</tr></tbody></table>`;

  if(hit!==null){
    html+=`<div style="font-size:9px;color:var(--gray3);margin-top:5px;letter-spacing:1px">
      α&nbsp;=&nbsp;${alpha.toFixed(1)}°&nbsp;→&nbsp;colonne la plus proche&nbsp;:&nbsp;<b style="color:#ff5060">${hit}°</b>
      &nbsp;·&nbsp;cos&nbsp;→&nbsp;HW&nbsp;·&nbsp;sin&nbsp;→&nbsp;XW
    </div>`;
  }

  document.getElementById('corr-box').insertAdjacentHTML('afterend',`<div id="trig-section">${html}</div>`);
}
function resetAll(){
  ['alt','oat','ias','gs','hdg','trk'].forEach((id,i)=>{
    document.getElementById(id).value=[8000,-5,150,165,90,75][i];
  });
  state={hdg:90,trk:75,tas:0,gs:165,wdir:null,wspd:null,wprov:null,hw:null,xw:null,calcDone:false};
  ['isa-ref','isa-dev','tas-val'].forEach(id=>document.getElementById(id).textContent='—');
  document.getElementById('b-wd').textContent='—';
  document.getElementById('b-hdg').textContent='090°';
  document.getElementById('b-trk').textContent='075°';
  document.getElementById('res-section').style.display='none';
  const old=document.getElementById('trig-section');if(old)old.remove();
  drawHSI();
}

/* ════════════════════════════════════════════
   drawHSI
   — Rose tourne avec HDG (tout en mag, comme v5)
   — Ligne verte COMPLÈTE bord à bord (provenance → direction)
   — Étiquette de l'angle magnétique du vent placée
     côté PROVENANCE (bout de la flèche verte)
════════════════════════════════════════════ */
function drawHSI(){
  const cv=document.getElementById('hsi');
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
  const Ro=W/2-6;
  ctx.clearRect(0,0,W,H);
  const hdg=state.hdg;

  /* ── Fond ── */
  ctx.beginPath();ctx.arc(cx,cy,Ro,0,2*Math.PI);
  ctx.fillStyle='#f0f8ff';ctx.fill();
  ctx.strokeStyle='#90b4c8';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,Ro*0.86,0,2*Math.PI);
  ctx.strokeStyle='#b0ccd8';ctx.lineWidth=1;ctx.stroke();

  /* ── Rose tournante ── */
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(-hdg*D);
  for(let i=0;i<360;i+=5){
    const a=i*D;
    const vbig=i%30===0,big=i%10===0;
    const r1=Ro*(vbig?0.70:big?0.74:0.79),r2=Ro*0.86;
    ctx.beginPath();
    ctx.moveTo(Math.sin(a)*r1,-Math.cos(a)*r1);
    ctx.lineTo(Math.sin(a)*r2,-Math.cos(a)*r2);
    ctx.strokeStyle=vbig?'#1a3040':big?'#2a5060':'#6090a8';
    ctx.lineWidth=vbig?1.8:big?0.9:0.4;ctx.stroke();
    if(vbig){
      const rt=Ro*0.60;
      const lbl={0:'N',30:'3',60:'6',90:'E',120:'12',150:'15',180:'S',210:'21',240:'24',270:'W',300:'30',330:'33'};
      if(lbl[i]!==undefined){
        ctx.save();
        ctx.translate(Math.sin(a)*rt,-Math.cos(a)*rt);
        ctx.rotate(a);
        const cardinal=i===0||i===90||i===180||i===270;
        ctx.fillStyle=i===0?'#c02030':cardinal?'#0a1e2c':'#1e4060';
        ctx.font=`bold ${cardinal?'13':'11'}px Courier New`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(lbl[i],0,0);
        ctx.restore();
      }
    }
  }
  ctx.beginPath();ctx.moveTo(0,-Ro*0.86);ctx.lineTo(0,-Ro*0.70);
  ctx.strokeStyle='#c02030';ctx.lineWidth=3;ctx.stroke();
  ctx.restore();

  /* ── Triangle index fixe ── */
  ctx.beginPath();ctx.moveTo(cx,cy-Ro*0.90);
  ctx.lineTo(cx-9,cy-Ro*1.02);ctx.lineTo(cx+9,cy-Ro*1.02);ctx.closePath();
  ctx.fillStyle='#b06000';ctx.fill();

  /* ── Aiguille CAP (ambre, fixe verticale) ── */
  {
    const fwd=Ro*0.84,bwd=Ro*0.84;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy-fwd);
    ctx.strokeStyle='#b06000';ctx.lineWidth=5;ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+bwd);
    ctx.strokeStyle='#7a4010';ctx.lineWidth=3;ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-fwd);ctx.lineTo(cx-11,cy-fwd+20);ctx.lineTo(cx+11,cy-fwd+20);ctx.closePath();
    ctx.fillStyle='#b06000';ctx.fill();
    ctx.beginPath();ctx.moveTo(cx-8,cy+bwd);ctx.lineTo(cx+8,cy+bwd);
    ctx.strokeStyle='#7a4010';ctx.lineWidth=3;ctx.stroke();
  }

  /* ── Aiguille ROUTE TRK (cyan pointillée) ── */
  {
    const a=(state.trk-hdg)*D;
    const fwd=Ro*0.84,bwd=Ro*0.84;
    const x1=cx+Math.sin(a)*fwd,y1=cy-Math.cos(a)*fwd;
    const x2=cx-Math.sin(a)*bwd,y2=cy+Math.cos(a)*bwd;
    ctx.setLineDash([7,5]);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x1,y1);
    ctx.strokeStyle='#006890';ctx.lineWidth=3;ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x2,y2);
    ctx.strokeStyle='#004870';ctx.lineWidth=2;ctx.stroke();
    ctx.setLineDash([]);
    const px=Math.cos(a),py=Math.sin(a);
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x1-Math.sin(a)*16+px*10,y1+Math.cos(a)*16+py*10);
    ctx.lineTo(x1-Math.sin(a)*16-px*10,y1+Math.cos(a)*16-py*10);
    ctx.closePath();ctx.fillStyle='#006890';ctx.fill();
    const mx=-Math.sin(a)*8,my=Math.cos(a)*8;
    ctx.beginPath();ctx.moveTo(x2+mx,y2+my);ctx.lineTo(x2-mx,y2-my);
    ctx.strokeStyle='#004870';ctx.lineWidth=2;ctx.stroke();

    /* ── Ligne perpendiculaire au TRK (pointillé jaune) ── */
    const perpA = a + Math.PI/2;   // angle perpendiculaire au TRK
    const perpR = Ro * 0.72;       // demi-longueur de la perpendiculaire
    const px1 = cx + Math.sin(perpA)*perpR, py1 = cy - Math.cos(perpA)*perpR;
    const px2 = cx - Math.sin(perpA)*perpR, py2 = cy + Math.cos(perpA)*perpR;
    ctx.save();
    ctx.setLineDash([8,6]);
    ctx.beginPath();ctx.moveTo(px1,py1);ctx.lineTo(px2,py2);
    ctx.strokeStyle='#e8c000';ctx.lineWidth=2.2;ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  /* ── Ligne VENT verte — COMPLÈTE bord à bord ──────────────────
     Axe de la ligne : angle = (wprov - hdg)*D  sur la rose
     wprov = provenance = d'où VIENT le vent  → bout flèche verte
     wdir  = vers où va le vent              → queue foncée
     La ligne traverse le centre d'un bord à l'autre.
     Flèche (pointe) côté PROVENANCE (x1,y1).
     Étiquette wprov en °mag placée côté provenance, près du bord.
  ────────────────────────────────────────────────────────────── */
  if(state.wprov!==null && state.wspd>0.5){
    const a=(state.wprov-hdg)*D;   // angle relatif provenance sur la rose

    /* Les deux extrémités sur le bord de la rose (rayon Ro*0.84)
       a = angle de la PROVENANCE sur la rose
       La flèche doit pointer vers la DIRECTION (sens opposé = a + π)
       → pointe (flèche) côté direction : x1/y1 = côté opposé à la provenance
       → queue côté provenance : x2/y2 = côté provenance                      */
    const r=Ro*0.84;
    /* côté DIRECTION (vers où souffle le vent) — bout de la flèche */
    const x1=cx-Math.sin(a)*r,    y1=cy+Math.cos(a)*r;
    /* côté PROVENANCE (d'où vient le vent) — queue */
    const x2=cx+Math.sin(a)*r,    y2=cy-Math.cos(a)*r;

    /* Ligne complète : queue (provenance) en vert foncé, pointe (direction) en vert clair */
    ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(cx,cy);
    ctx.strokeStyle='#004830';ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x1,y1);
    ctx.strokeStyle='#007850';ctx.lineWidth=4;ctx.stroke();

    /* Flèche côté DIRECTION (pointe vers où souffle le vent) */
    const aDir=a+Math.PI;   // angle de la direction sur le canvas
    const px=Math.cos(aDir),py=Math.sin(aDir);
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x1-Math.sin(aDir)*16+px*10, y1+Math.cos(aDir)*16+py*10);
    ctx.lineTo(x1-Math.sin(aDir)*16-px*10, y1+Math.cos(aDir)*16-py*10);
    ctx.closePath();ctx.fillStyle='#007850';ctx.fill();

    /* Crosse côté PROVENANCE (queue) */
    const mx=-Math.sin(a)*9,my=Math.cos(a)*9;
    ctx.beginPath();ctx.moveTo(x2+mx,y2+my);ctx.lineTo(x2-mx,y2-my);
    ctx.strokeStyle='#004830';ctx.lineWidth=2.5;ctx.stroke();

    /* Étiquette : angle magnétique de la PROVENANCE du vent
       placée côté provenance (queue), légèrement au-delà du bord */
    const lblR=Ro*0.96;
    const lx=cx+Math.sin(a)*lblR, ly=cy-Math.cos(a)*lblR;
    ctx.fillStyle='#005c3c';ctx.font='bold 11px Courier New';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(state.wprov.toFixed(0).padStart(3,'0')+'°M', lx, ly);

  }

  /* ── Symbole avion fixe ── */
  ctx.fillStyle='#2a4860';
  ctx.beginPath();ctx.moveTo(cx,cy-20);ctx.lineTo(cx+4,cy+16);ctx.lineTo(cx,cy+11);ctx.lineTo(cx-4,cy+16);ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#0a2840';
  ctx.beginPath();ctx.moveTo(cx-22,cy+3);ctx.lineTo(cx+22,cy+3);ctx.lineTo(cx+18,cy-4);ctx.lineTo(cx-18,cy-4);ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#1a3850';
  ctx.beginPath();ctx.moveTo(cx-10,cy+14);ctx.lineTo(cx+10,cy+14);ctx.lineTo(cx+6,cy+6);ctx.lineTo(cx-6,cy+6);ctx.closePath();
  ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy-20,3.5,0,2*Math.PI);ctx.fillStyle='#0a1e30';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,5,0,2*Math.PI);ctx.fillStyle='#b06000';ctx.fill();

  /* ── Cap numérique ── */
  ctx.fillStyle='#b06000';ctx.font='bold 14px Courier New';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(hdg.toFixed(0).padStart(3,'0')+'°',cx,cy+Ro*0.54);
}

liveVP();
drawHSI();
</script>
